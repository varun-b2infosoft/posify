kind = "mobile"
previewPath = "/"
title = "POS Dashboard"
version = "1.0.0"
id = "artifacts/pos-dashboard"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 25391

[services.development]
run = "pnpm --filter @workspace/pos-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pos-dashboard", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/pos-dashboard", "run", "serve" ]

[services.env]
PORT = "25391"
BASE_PATH = "/"
